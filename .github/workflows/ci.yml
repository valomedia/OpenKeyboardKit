name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    # Keep fork pull requests skipped per repository policy;
    # pushes and same-repository pull requests still run CI.
    if: >-
      github.event_name == 'push' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: macos-15
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Run SwiftLint
        run: swiftlint --strict

  build:
    name: Build
    # Keep fork pull requests skipped per repository policy;
    # pushes and same-repository pull requests still run CI.
    if: >-
      github.event_name == 'push' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.4'

      - name: Build all platforms
        run: bash scripts/build.sh OpenKeyboardKit

  unit-tests:
    name: Unit tests
    # Keep fork pull requests skipped per repository policy;
    # pushes and same-repository pull requests still run CI.
    if: >-
      github.event_name == 'push' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.4'

      - name: Run unit tests
        run: bash scripts/test.sh OpenKeyboardKit
